name: Backend CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --exclude venv

      - name: Run ruff format check
        run: ruff format --check . --exclude venv

  # ──────────────────────────────────────────────
  # 2. Test
  # ──────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      JWT_SECRET: "ci-test-secret-key-that-is-32-chars!!"
      SUPABASE_URL: "https://test.supabase.co"
      SUPABASE_KEY: "ci-test-supabase-key"
      BREVO_API_KEY: "ci-test-brevo-api-key-minimum-length"
      SENDER_EMAIL: "ci@example.com"
      JWT_EXPIRE_MINUTES: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx respx

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v \
            --cov=. \
            --cov-omit="venv/*,tests/*" \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Security scan
  # ──────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r . \
            --exclude ./venv,./tests \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            || true   # report but don't fail the build yet
