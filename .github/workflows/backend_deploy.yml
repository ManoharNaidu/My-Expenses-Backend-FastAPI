name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "My Expenses API/**"
      - ".github/workflows/backend_deploy.yml"

env:
  PYTHON_VERSION: "3.13"
  WORKING_DIR: "My Expenses API"

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint & Security
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "My Expenses API/requirements.txt"

      - name: Install tools
        run: pip install ruff pip-audit

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements.txt --strict

  # ──────────────────────────────────────────────
  # 2. Integration Tests
  # ──────────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_expenses
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    env:
      DATABASE_URL_TEST: postgresql://test_user:test_pass@localhost:5432/test_expenses
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-minimum-32-chars-long' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'placeholder-key-for-ci' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "My Expenses API/requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Apply SQL migrations to test DB
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f …"
            PGPASSWORD=test_pass psql -h localhost -U test_user -d test_expenses -f "$f" || true
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "⚠️  No tests directory yet – skipping."

  # ──────────────────────────────────────────────
  # 3. Migration Head Check
  # ──────────────────────────────────────────────
  migration-check:
    name: Migration Consistency
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: migration_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Apply all migrations sequentially
        run: |
          FAIL=0
          for f in $(ls migrations/*.sql 2>/dev/null | sort); do
            echo "::group::Applying $f"
            if ! PGPASSWORD=test_pass psql -h localhost -U test_user -d migration_check -f "$f"; then
              echo "::error::Migration $f FAILED"
              FAIL=1
            fi
            echo "::endgroup::"
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more migrations failed – fix before deploying."
            exit 1
          fi
          echo "✅ All migrations applied cleanly."

  # ──────────────────────────────────────────────
  # 4. Deploy to Render
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, migration-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          RESPONSE=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
          else
            echo "::error::Render deploy hook returned HTTP $RESPONSE"
            exit 1
          fi

